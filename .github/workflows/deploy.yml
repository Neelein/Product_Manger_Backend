name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -count=1 ./src/...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/neelein/product_manager_backend:latest
            ghcr.io/neelein/product_manager_backend:${{ github.sha }}

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p /home/runner/.ssh
          echo "$SSH_KEY" > /home/runner/.ssh/deploy_key
          chmod 600 /home/runner/.ssh/deploy_key

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: /home/runner/.ssh/deploy_key
          script: |
            docker pull ghcr.io/neelein/product_manager_backend:latest
            docker exec my_postgres_db psql -U root -c "CREATE DATABASE productdb;" 2>/dev/null || true
            docker stop pm_app || true
            docker rm pm_app || true
            docker run -d \
              --name pm_app \
              --network my_app_net \
              --restart unless-stopped \
              -p 8090:8090 \
              -v /root/Product/product_manger/media:/app/media \
              -e MEDIA_ROOT=/app/media \
              -e DATABASE_URL="postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@my_postgres_db:5432/productdb?sslmode=disable" \
              ghcr.io/neelein/product_manager_backend:latest
